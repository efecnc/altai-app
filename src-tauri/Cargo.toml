[package]
name = "altai"
version = "0.5.955"
description = "ALTAI — open agentic development environment powered by ALTAI"
authors = ["ALTAI Dev Team"]
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/efecnc/altai-app"

[lib]
name = "altai_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["protocol-asset"] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
portable-pty = "0.9"
dirs = "5"
log = "0.4"
ignore = "0.4"
# Real-time filesystem watching for the file explorer (live tree refresh).
notify = "6"
grep-regex = "0.1"
grep-searcher = "0.1"
grep-matcher = "0.1"
globset = "0.4"
shared_child = "1"
tauri-plugin-log = "2"
tauri-plugin-os = "2"
tauri-plugin-store = "2"
tauri-plugin-process = "2"
tauri-plugin-dialog = "2"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream", "json"] }
bytes = "1"
futures-util = "0.3"
tokio = { version = "1", features = ["full"] }
tempfile = "3"
uuid = { version = "1", features = ["v4"] }
async-trait = "0.1"
# LSP installer — checksum + archive extraction for downloaded language servers.
sha2 = "0.10"
flate2 = "1"
hex = "0.4"
tar = "0.4"

# İsanAgent — embedded as Rust crate (direct API, no sidecar)
isanagent = { git = "https://github.com/altaidevorg/isanagent.git", branch = "main" }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(target_os = "windows")'.dependencies]
keyring = { version = "3.6", default-features = false, features = ["windows-native"] }
windows-sys = { version = "0.59", features = [
	"Win32_Foundation",
	"Win32_Security",
	"Win32_System_JobObjects",
	"Win32_System_Threading",
] }

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-autostart = "2"
tauri-plugin-updater = "2"
tauri-plugin-window-state = "2"

[profile.dev]
incremental = true

[profile.release]
codegen-units = 1
lto = "fat"
opt-level = "s"
panic = "abort"
strip = true
