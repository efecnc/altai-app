name: Sync İsanAgent
on:
  repository_dispatch:
    types: [isanagent-released]
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Resolve latest İsanAgent main
        run: cargo update --manifest-path src-tauri/Cargo.toml -p isanagent
      - name: Check for a dependency update
        id: changes
        run: |
          if git diff --quiet -- src-tauri/Cargo.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Open and merge PR
        if: steps.changes.outputs.changed == 'true'
        env:
          # Org policy blocks GITHUB_TOKEN from creating PRs
          # ("GitHub Actions is not permitted to create or approve pull requests").
          # Use a fine-grained PAT with Contents + Pull requests write on this repo.
          GH_TOKEN: ${{ secrets.ISANAGENT_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::ISANAGENT_SYNC_TOKEN secret is missing. Add a fine-grained PAT (Contents + Pull requests: write on altai-app) at Settings → Secrets → Actions. Org policy blocks GITHUB_TOKEN from opening PRs."
            exit 1
          fi
          BRANCH="chore/sync-isanagent-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src-tauri/Cargo.lock
          git commit -m "chore: sync isanagent main"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/heads/${BRANCH}"
          gh label create "isanagent-bump" --description "Automated İsanAgent main sync" --color "0E8A16" 2>/dev/null || true
          PR_URL="$(gh pr create \
            --title "chore: sync isanagent main" \
            --head "$BRANCH" \
            --base main \
            --label "isanagent-bump" \
            --body "Updates the recorded İsanAgent \`main\` revision in \`Cargo.lock\`. ALTAI already refreshes İsanAgent before compile (\`pnpm isanagent:sync\` / CI / release), so this PR only keeps the lockfile tip current. Auto-merged by Sync İsanAgent after CI passes.")"
          echo "Opened $PR_URL"
          # Queue auto-merge (repo has allow_auto_merge); still wait for checks then merge
          # so we don't depend on required-status-check branch protection being configured.
          gh pr merge "$PR_URL" --auto --squash || true
          gh pr checks "$PR_URL" --watch --fail-fast
          if [[ "$(gh pr view "$PR_URL" --json state -q .state)" == "OPEN" ]]; then
            gh pr merge "$PR_URL" --squash --delete-branch
          fi
          echo "Merged $PR_URL"
