name: Bump İsanAgent
on:
  repository_dispatch:
    types: [isanagent-released]
  schedule:
    - cron: '0 9 * * MON'
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get latest isanagent tag
        id: tag
        run: |
          LATEST=$(gh release view --repo altaidevorg/isanagent --json tagName -q .tagName)
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update Cargo.toml
        run: |
          sed -i "s|tag = \"v[0-9.]*\"|tag = \"${{ steps.tag.outputs.latest }}\"|" src-tauri/Cargo.toml
      - name: Test build
        run: |
          cd src-tauri && cargo build --release
      - name: Open PR
        run: |
          BRANCH="chore/bump-isanagent-${{ steps.tag.outputs.latest }}"
          git checkout -b "$BRANCH"
          git add src-tauri/Cargo.toml
          git commit -m "chore: bump isanagent to ${{ steps.tag.outputs.latest }}"
          git push origin "$BRANCH"
          gh pr create --title "chore: bump isanagent to ${{ steps.tag.outputs.latest }}" --label "isanagent-bump"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
