name: Sync İsanAgent
on:
  repository_dispatch:
    types: [isanagent-released]
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Resolve latest İsanAgent main
        run: cargo update --manifest-path src-tauri/Cargo.toml -p isanagent
      - name: Check for a dependency update
        id: changes
        run: |
          if git diff --quiet -- src-tauri/Cargo.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Open and merge PR
        if: steps.changes.outputs.changed == 'true'
        env:
          # Org policy blocks GITHUB_TOKEN from creating PRs
          # ("GitHub Actions is not permitted to create or approve pull requests").
          # Use a fine-grained PAT with Contents + Pull requests write on this repo.
          GH_TOKEN: ${{ secrets.ISANAGENT_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::ISANAGENT_SYNC_TOKEN secret is missing. Add a fine-grained PAT (Contents + Pull requests: write on altai-app) at Settings → Secrets → Actions. Org policy blocks GITHUB_TOKEN from opening PRs."
            exit 1
          fi
          BRANCH="chore/sync-isanagent-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src-tauri/Cargo.lock
          git commit -m "chore: sync isanagent main"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/heads/${BRANCH}"
          gh label create "isanagent-bump" --description "Automated İsanAgent main sync" --color "0E8A16" 2>/dev/null || true
          PR_URL="$(gh pr create \
            --title "chore: sync isanagent main" \
            --head "$BRANCH" \
            --base main \
            --label "isanagent-bump" \
            --body "Updates the recorded İsanAgent \`main\` revision in \`Cargo.lock\`. ALTAI already refreshes İsanAgent before compile (\`pnpm isanagent:sync\` / CI / release), so this PR only keeps the lockfile tip current.

          Merged automatically by Sync İsanAgent **only after every CI check has passed**.")"
          echo "Opened $PR_URL"

          # Do NOT use `gh pr merge --auto` here: main has no required status checks, so
          # GitHub auto-merge can land the PR before CI finishes. Wait for all checks,
          # verify they passed, then squash-merge.
          if ! gh pr checks "$PR_URL" --watch --fail-fast; then
            {
              echo "### Sync İsanAgent — CI failed"
              echo
              echo "Leaving this PR open for manual triage. Recent checks:"
              echo
              echo '```'
              gh pr checks "$PR_URL" || true
              echo '```'
            } | gh pr comment "$PR_URL" --body-file -
            echo "::error::CI checks failed for $PR_URL; not merging."
            exit 1
          fi

          # Explicit gate: refuse to merge unless every rollup check is completed successfully.
          # Allow SUCCESS / NEUTRAL / SKIPPED; anything else (or incomplete) blocks merge.
          BAD="$(gh pr view "$PR_URL" --json statusCheckRollup --jq '
            [
              .statusCheckRollup[]?
              | select(
                  (.status != "COMPLETED")
                  or (
                    (.conclusion // "") != "SUCCESS"
                    and (.conclusion // "") != "NEUTRAL"
                    and (.conclusion // "") != "SKIPPED"
                  )
                )
              | "\(.name // .context // "unknown"): status=\(.status // "?") conclusion=\(.conclusion // "?")"
            ]
            | join("\n")
          ')"
          if [[ -n "$BAD" ]]; then
            {
              echo "### Sync İsanAgent — refusing merge (checks not all green)"
              echo
              echo '```'
              echo "$BAD"
              echo '```'
            } | gh pr comment "$PR_URL" --body-file -
            echo "::error::Not all checks passed for $PR_URL:"
            echo "$BAD"
            exit 1
          fi

          STATE="$(gh pr view "$PR_URL" --json state -q .state)"
          case "$STATE" in
            OPEN)
              gh pr merge "$PR_URL" --squash --delete-branch
              echo "Merged $PR_URL after all checks passed"
              ;;
            MERGED)
              echo "PR already merged: $PR_URL"
              ;;
            *)
              echo "::error::Unexpected PR state for $PR_URL: $STATE"
              exit 1
              ;;
          esac
