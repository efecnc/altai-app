name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Compile-check on every target so the platform-gated native code
        # (macOS Dock menu / Windows Jump List) is verified on PRs, not just at
        # release time. The full clippy + test pass runs on Linux only to keep
        # CI fast.
        os: [ubuntu-22.04, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        # Tauri 2 needs webkit2gtk-4.1 + the ayatana appindicator. Mirrors the
        # canonical set from release.yml — keep these in sync.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.os }}

      - name: Sync latest İsanAgent main
        run: cargo update --manifest-path src-tauri/Cargo.toml -p isanagent

      - run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Clippy + tests (Linux only)
        if: runner.os == 'Linux'
        run: |
          cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
          cargo test --manifest-path src-tauri/Cargo.toml

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
