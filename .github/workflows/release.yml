name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Created if missing."
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS (Apple Silicon)
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - os: macos-14
            label: macOS (Intel)
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - os: ubuntu-22.04
            label: Linux (x86_64)
            target: x86_64-unknown-linux-gnu
            args: ""
          - os: windows-latest
            label: Windows (x86_64)
            target: x86_64-pc-windows-msvc
            args: ""

    steps:
      - uses: actions/checkout@v6

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NAME="${{ inputs.tag }}"
          else
            NAME="${GITHUB_REF##refs/tags/}"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          # Treat any tag with a SemVer pre-release identifier (anything
          # after a `-`: `-beta.1`, `-rc.2`, `-alpha`, `-canary`) as a
          # GitHub pre-release so it doesn't claim the "Latest" slot away
          # from the current stable.
          if [[ "$NAME" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Tauri 2 needs webkit2gtk-4.1 + the ayatana appindicator. The old
          # libappindicator3-dev conflicts with libayatana-appindicator3-dev
          # on 22.04 (mutual `Conflicts:` declaration), so keep only ayatana.
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Tauri build args
        id: build_args
        shell: bash
        run: |
          # WiX MSI rejects pre-release identifiers that aren't numeric-only
          # ("-beta.1", "-rc.2" etc. blow up with "must be numeric-only and
          # cannot be greater than 65535 for msi target"). On prerelease
          # tags we drop the MSI bundle for Windows and ship the NSIS .exe
          # only; stable tags still produce both .exe and .msi.
          #
          # NOTE: the Windows bundle target is `nsis` ONLY — `app` is a
          # macOS-only target and `--bundles app,nsis` errors on Windows with
          # "invalid value 'app' for '--bundles'", which silently broke every
          # prerelease Windows build (v0.5.8-beta.*, v0.5.903-beta.1).
          if [ "${{ runner.os }}" = "Windows" ] && [ "${{ steps.tag.outputs.prerelease }}" = "true" ]; then
            echo 'args=--bundles nsis' >> "$GITHUB_OUTPUT"
          else
            echo 'args=${{ matrix.args }}' >> "$GITHUB_OUTPUT"
          fi

      - name: Build & bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple signing identity, no Windows EV cert, no Tauri updater
          # signing — we intentionally do NOT set the related env vars at all.
          # tauri-action treats unset as "skip", but setting them to "" makes
          # newer versions try to base64-decode an empty string and fail.
          # macOS bundles get ad-hoc signed via `signingIdentity: "-"` in
          # tauri.conf.json; Windows installers ship unsigned. Users follow
          # the bypass steps in INSTALL.md on first launch.
        with:
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: "ALTAI ${{ steps.tag.outputs.name }}"
          releaseBody: |
            ## ALTAI ${{ steps.tag.outputs.name }}

            See [INSTALL.md](https://github.com/altaidevorg/altai-app/blob/main/INSTALL.md) for one-time install instructions per platform — the binaries are unsigned, so macOS Gatekeeper and Windows SmartScreen will warn the first time.

            **macOS:** `xattr -dr com.apple.quarantine /Applications/ALTAI.app`
            **Windows:** Click "More info" → "Run anyway" on the SmartScreen prompt.
            **Linux:** Install the `.deb` or run the `.AppImage` directly.
          releaseDraft: false
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
          includeUpdaterJson: false
          args: ${{ steps.build_args.outputs.args }}
